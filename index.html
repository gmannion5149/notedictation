<style>
  :root{
    --bg:#0E1014;--glass:rgba(32,36,45,.55);--border:rgba(255,255,255,.09);
    --maroon:#C8324F;--maroon-bright:#E84066;--maroon-deep:#4E0F20;
    --maroon-soft:rgba(200,50,79,.16);
    --glow:0 0 16px rgba(200,50,79,.55),0 0 3px rgba(232,64,102,.9);
    --text:#E9EBEF;--muted:#838996;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  body{min-height:100dvh;position:relative;overflow-x:hidden;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    background:
      radial-gradient(60% 40% at 50% -5%,rgba(200,50,79,.18),transparent 70%),
      radial-gradient(70% 50% at 50% 110%,rgba(200,50,79,.10),transparent 70%),
      linear-gradient(180deg,#0E1014,#0B0D11);}
  .wrap{max-width:560px;margin:0 auto;padding:14px 18px 44px;position:relative;z-index:1;}

  .led-bar{height:3px;border-radius:3px;margin:6px 2px 20px;overflow:hidden;
    background:rgba(255,255,255,.05);position:relative;}
  .led-bar::after{content:"";position:absolute;inset:0;width:40%;
    background:linear-gradient(90deg,transparent,var(--maroon-bright),transparent);
    box-shadow:var(--glow);animation:sweep 3.4s ease-in-out infinite;}
  @keyframes sweep{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
  @media (prefers-reduced-motion:reduce){.led-bar::after{animation:none;transform:translateX(150%)}}

  header{display:flex;align-items:center;gap:13px;margin-bottom:20px;}
  .emblem{flex:0 0 auto;width:40px;height:40px;filter:drop-shadow(0 0 7px rgba(200,50,79,.6));}
  .brand h1{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:18px;
    letter-spacing:.05em;margin:0;line-height:1.05;}
  .brand p{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--maroon);margin:5px 0 0;text-shadow:0 0 8px rgba(200,50,79,.5);}

  .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:24px;}
  .tab{appearance:none;border:1px solid var(--border);background:var(--glass);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:var(--muted);
    border-radius:15px;padding:13px 6px;cursor:pointer;transition:.18s;
    display:flex;flex-direction:column;align-items:center;gap:7px;
    font-family:'Chakra Petch',sans-serif;font-weight:500;font-size:12.5px;letter-spacing:.02em;}
  .tab .ico svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;}
  .tab.active{color:var(--text);border-color:var(--maroon);
    background:linear-gradient(180deg,var(--maroon-soft),var(--glass));
    box-shadow:var(--glow),inset 0 0 14px rgba(200,50,79,.12);}
  .tab.active .ico svg{stroke:var(--maroon-bright);filter:drop-shadow(0 0 4px rgba(200,50,79,.8));}
  .tab:active{transform:scale(.96);}

  .stage{display:flex;flex-direction:column;align-items:center;padding:6px 0 2px;}
  .mic-btn{position:relative;width:128px;height:128px;border:none;background:none;
    cursor:pointer;padding:0;margin:4px 0 16px;}
  .mic-ring{position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 50% 36%,rgba(60,66,78,.5),rgba(20,23,29,.7)),var(--glass);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:2px solid var(--maroon-deep);display:flex;align-items:center;justify-content:center;
    transition:.22s;box-shadow:inset 0 1px 1px rgba(255,255,255,.08),0 8px 30px rgba(0,0,0,.5);}
  .mic-btn svg.mic{width:48px;height:48px;}
  .mic-btn svg.mic path{fill:var(--muted);transition:.22s;}
  .mic-btn.live .mic-ring{border-color:var(--maroon-bright);
    box-shadow:var(--glow),0 0 0 5px var(--maroon-soft),inset 0 0 22px rgba(200,50,79,.2);}
  .mic-btn.live svg.mic path{fill:var(--maroon-bright);filter:drop-shadow(0 0 8px rgba(232,64,102,.9));}
  .pulse{position:absolute;inset:0;border-radius:50%;border:2px solid var(--maroon);opacity:0;}
  .mic-btn.live .pulse{animation:pulse 1.9s ease-out infinite;}
  @keyframes pulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.5);opacity:0}}
  @media (prefers-reduced-motion:reduce){.mic-btn.live .pulse{animation:none;opacity:0}}

  .status{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.08em;
    color:var(--muted);min-height:18px;margin-bottom:16px;text-transform:uppercase;
    display:flex;align-items:center;gap:9px;text-align:center;}
  .status.ready{color:var(--text);text-shadow:0 0 10px rgba(200,50,79,.35);}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--maroon-bright);
    box-shadow:var(--glow);animation:blink 1.1s infinite;flex:0 0 auto;}
  @keyframes blink{50%{opacity:.2}}

  .label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted);margin:16px 2px 8px;
    display:flex;justify-content:space-between;align-items:center;}
  .label .clear{color:var(--maroon-bright);cursor:pointer;letter-spacing:.06em;
    font-size:11px;text-shadow:0 0 8px rgba(200,50,79,.5);}
  textarea{width:100%;background:var(--glass);backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);border:1px solid var(--border);color:var(--text);
    border-radius:16px;padding:15px;font-family:'Inter';font-size:15.5px;line-height:1.55;
    resize:vertical;min-height:118px;outline:none;transition:border .18s,box-shadow .18s;
    caret-color:var(--maroon-bright);}
  textarea:focus{border-color:var(--maroon);box-shadow:0 0 0 1px var(--maroon),0 0 18px rgba(200,50,79,.25);}
  textarea::placeholder{color:#565c68;}

  .btn{width:100%;border:none;border-radius:16px;padding:17px;cursor:pointer;transition:.16s;
    margin-top:16px;font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:15px;letter-spacing:.04em;}
  .btn:active{transform:scale(.985);}
  .btn-led{color:#fff;background:linear-gradient(180deg,var(--maroon),var(--maroon-deep));
    border:1px solid var(--maroon-bright);
    box-shadow:0 0 18px rgba(200,50,79,.45),inset 0 1px 1px rgba(255,255,255,.18);}
  .btn-led:disabled{opacity:.35;box-shadow:none;cursor:default;}
  .btn-ghost{background:var(--glass);border:1px solid var(--border);color:var(--muted);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}

  .output-card{border:1px solid var(--maroon);border-radius:18px;padding:16px;margin-top:20px;
    background:linear-gradient(180deg,var(--maroon-soft),var(--glass));
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    box-shadow:0 0 22px rgba(200,50,79,.2);display:none;}
  .output-card.show{display:block;animation:rise .3s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .output-card h3{font-family:'Chakra Petch';font-weight:600;font-size:13px;letter-spacing:.1em;
    color:var(--maroon-bright);margin:0 0 12px;text-transform:uppercase;text-shadow:0 0 10px rgba(200,50,79,.5);}

  .note-out{color:#ffffff;background:rgba(8,10,14,.66);border:1px solid var(--border);
    border-radius:12px;padding:16px;max-height:46vh;overflow:auto;font-size:14px;line-height:1.6;}
  .note-out .lbl{font-weight:700;text-decoration:underline;}
  .note-out .row{margin:1px 0;}
  .note-out .bul{margin:1px 0 1px 18px;}
  .note-out .sum{margin-bottom:9px;}
  .note-out .sp{height:8px;}

  .fb-note{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--muted);
    margin-top:9px;letter-spacing:.04em;display:none;}
  .fb-note.show{display:block;}
  .copy-row{display:flex;gap:10px;margin-top:13px;}
  .copy-row .btn{margin-top:0;}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    font-family:'Chakra Petch';font-weight:600;font-size:14px;color:#fff;
    background:linear-gradient(180deg,var(--maroon),var(--maroon-deep));
    border:1px solid var(--maroon-bright);padding:13px 22px;border-radius:30px;opacity:0;
    transition:.25s;pointer-events:none;z-index:50;box-shadow:0 0 24px rgba(200,50,79,.55);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .hint{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--muted);
    text-align:center;margin-top:20px;line-height:1.7;letter-spacing:.03em;opacity:.8;}
  .warn{background:rgba(200,50,79,.1);border:1px solid var(--maroon);color:#f0b6c1;
    border-radius:13px;padding:12px 14px;font-size:13px;line-height:1.5;margin-bottom:18px;
    display:none;font-family:'Inter';}
  .warn.show{display:block;}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.35);
    border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;vertical-align:-2px;margin-right:8px;}
  @keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="led-bar"></div>
  <header>
    <svg class="emblem" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <line x1="10" y1="30" x2="10" y2="18" stroke="#E84066" stroke-width="3" stroke-linecap="round"></line>
      <line x1="18" y1="34" x2="18" y2="14" stroke="#E84066" stroke-width="3" stroke-linecap="round"></line>
      <line x1="26" y1="31" x2="26" y2="17" stroke="#C8324F" stroke-width="3" stroke-linecap="round"></line>
      <line x1="34" y1="27" x2="34" y2="21" stroke="#C8324F" stroke-width="3" stroke-linecap="round"></line>
      <line x1="42" y1="29" x2="42" y2="19" stroke="#E84066" stroke-width="3" stroke-linecap="round"></line>
    </svg>
    <div class="brand">
      <h1>NOTE DICTATION GENERATOR</h1>
      <p>Speak · Format · Paste to Clio</p>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-type="intake">
      <span class="ico"><svg viewBox="0 0 24 24"><path d="M9 3h6a2 2 0 0 1 2 2v0H7v0a2 2 0 0 1 2-2z"></path><rect x="5" y="4" width="14" height="17" rx="2"></rect><path d="M9 11h6M9 15h4"></path></svg></span>Intake</button>
    <button class="tab" data-type="court">
      <span class="ico"><svg viewBox="0 0 24 24"><path d="M12 3v18M5 21h14M7 8l-3 5h6zM17 8l-3 5h6zM12 6l8 2M12 6 4 8"></path></svg></span>Court</button>
    <button class="tab" data-type="checkin">
      <span class="ico"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v4h-4"></path></svg></span>Check-In</button>
  </div>

  <div class="warn" id="warn"></div>

  <div class="stage">
    <button class="mic-btn" id="micBtn" aria-label="Start dictation">
      <span class="pulse"></span>
      <span class="mic-ring">
        <svg class="mic" viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z"></path><path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11Z"></path></svg>
      </span>
    </button>
    <div class="status" id="status">// tap a type or the mic</div>
  </div>

  <div class="label">Transcript<span class="clear" id="clearBtn">clear</span></div>
  <textarea id="transcript" placeholder="Spoken words land here. Say a note type to switch, then dictate. You can also type, paste, or edit before generating."></textarea>

  <button class="btn btn-led" id="formatBtn" disabled="">Generate Smart Notes</button>

  <div class="output-card" id="outputCard">
    <h3 id="outTitle">Formatted Note</h3>
    <div class="note-out" id="noteOut"></div>
    <div class="fb-note" id="fbNote">// auto-structured on-device · AI formatting was unavailable</div>
    <div class="copy-row">
      <button class="btn btn-led" id="copyBtn">Copy for Clio</button>
      <button class="btn btn-ghost" id="reformatBtn">Redo</button>
    </div>
  </div>

  <div class="hint">Dictation runs on-device.<br>Smart formatting runs through your private Worker.</div>
</div>

<div class="toast" id="toast">Copied</div>

<script>
/* ============================================================
   CONFIG  —  one-time setup, then it works on every device.
   WORKER_URL : paste your Cloudflare Worker URL between the quotes.
   APP_TOKEN  : optional; only if you set an APP_TOKEN secret on the Worker.
   Neither value is secret. It is safe to leave them in this file.
   ============================================================ */
const WORKER_URL = "https://note-notes.gmannion.workers.dev";
const APP_TOKEN  = "";

/* ---------- Output titles ---------- */
const TITLES={intake:"Intake Note",court:"Court Summary",checkin:"Case Review / Check-In"};
const TYPE_LABEL={intake:"Intake",court:"Court Summary",checkin:"Case Review"};
const noteFont=()=> "'Times New Roman', Times, serif";

/* ---------- Reference skeleton (ordering hint for the AI) ---------- */
const INTAKE_SKELETON=[
"Potential Client called regarding their [charge] case.",
"Originated By: GWM","Assigned Attorney: GWM","Caller: Potential Client \u2014 [name]",
"Court File / Citation Number: ","Offense Date: ","Court Date: ","Location: ",
"Aggravating Factors:","\u2022 [factor]",
"Vehicle Description: ","Vehicle Owner: ","Vehicle Category: ","Residency: ","CDL: ",
"Testing Method: ","Result / Reading: ","Documents Received: ","Interlock Required: ",
"Driver's License: ","License Plate: ","Revocation Start Date: ","Revocation Length: ",
"Implied Consent Deadline: ","Fast Track: ",
"Prior Impaired Driving Offense(s): ","\u2022 [prior]",
"Employment Status: ","Occupation / Employer: ","License Needs: ","Custody Status: ",
"Mandatory Bail: ","Time in Custody: ","Conditions of Release: ","Bail Amount: ",
"Details:","\u2022 [clean narrative of the stop and the client's account]",
"Flat Fee: ","Payment Terms: ","Next Steps:","\u2022 Follow up"
].join("\n");

const OMIT_RULE="- Include a label or section ONLY if the dictation provides information for it. Omit any label or section with no information; never output a dash or an empty heading.\n";

function todayStr(){ return new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"}); }

function intakePrompt(raw,today){
  return "You are an intake assistant for a Minnesota criminal defense and DWI law firm. "
    +"Convert the raw intake-call dictation into a clean, structured DWI Intake Note to paste into Clio.\n\n"
    +"The current date is "+today+".\n\n"
    +"Use this set of labels and this order as your reference:\n\n"+INTAKE_SKELETON+"\n\nRULES:\n"
    +"- Plain text only. No markdown, asterisks, or backticks.\n"+OMIT_RULE
    +"- The opening line MUST read exactly: \"Potential Client called on "+today+" regarding their [charge] case.\" Use the charge if given (e.g., \"3rd Degree Gross Misdemeanor DWI\"); otherwise \"DWI\".\n"
    +"- Always include the opening line, \"Originated By: GWM\", and \"Assigned Attorney: GWM\" (use other initials only if stated). Keep the order shown for whichever fields are present.\n"
    +"- Format the caller as: Potential Client \u2014 [name].\n"
    +"- Write dates as \"Month D, YYYY\" and times as \"H:MM AM/PM\".\n"
    +"- Keep the spaced em dash \" \u2014 \" connector in the Caller, CDL, Fast Track, and prior lines when present.\n"
    +"- Aggravating Factors may only restate facts actually stated (e.g., a reading of .16 or more, a child in the vehicle). Never invent factors.\n"
    +"- Do not invent names, charges, numbers, dollar amounts, or legal conclusions.\n"
    +"- The Details bullet is a tight, professional summary of the client's account.\n\n"
    +"RAW DICTATION:\n\"\"\""+raw+"\"\"\"";
}
function courtPrompt(raw,today){
  return "You are a legal assistant for a Minnesota criminal defense and DWI attorney. "
    +"Convert the raw post-hearing dictation into a clean, structured Court Summary to paste into Clio.\n\n"
    +"The current date is "+today+".\n\n"
    +"Follow this structure, labels, and order (one item per line):\n\n"
    +"GWM appeared [with Client / without Client] on "+today+".\n"
    +"Judge: [name]\nProsecutor: [name]\n"
    +"Offer:\n\u2022 [each offer term as its own bullet]\n"
    +"Details:\n\u2022 [what happened at the hearing, clean professional prose]\n"
    +"Next Court Date: [Date] \u2014 [Hearing type]\n"
    +"Notes for Paula:\n\u2022 [any instructions for the assistant]\n"
    +"Notes for Client:\n\u2022 [any message to relay to the client]\n\nRULES:\n"
    +"- Plain text only. No markdown, asterisks, or backticks.\n"+OMIT_RULE
    +"- The note MUST start with the opening line beginning \"GWM appeared\". Use \"with Client\" or \"without Client\" exactly as the dictation indicates; if it is not stated, write \"with Client\".\n"
    +"- The opening line always ends with \"on "+today+".\" If the hearing type is stated, append it as: \"GWM appeared with Client on "+today+" for the [Hearing type].\"\n"
    +"- Keep the spaced em dash \" \u2014 \" in the Next Court Date line.\n"
    +"- Write each offer term and each instruction as its own bullet beginning with \"\u2022 \".\n"
    +"- Use only stated facts; never invent names, dates, offer terms, or amounts.\n\n"
    +"RAW DICTATION:\n\"\"\""+raw+"\"\"\"";
}
function checkinPrompt(raw,today){
  return "You are a legal assistant for a Minnesota criminal defense and DWI attorney. "
    +"Convert the raw client check-in / case-review dictation into a clean, structured note to paste into Clio.\n\n"
    +"The current date is "+today+".\n\n"
    +"Follow this structure, labels, and order (one item per line):\n\n"
    +"GWM met with Client [by phone / in person / by Zoom] on "+today+".\n"
    +"Evidence & Strategy Review:\n\u2022 [discussion of evidence and strategy]\n"
    +"Offer Relayed:\n\u2022 [the offer presented to the client]\n"
    +"Client Position: [Accepted / Rejected / Undecided]\n"
    +"Attorney's Advice:\n\u2022 [the advice given]\n"
    +"Next Steps:\n\u2022 [each next step as its own bullet]\n\nRULES:\n"
    +"- Plain text only. No markdown, asterisks, or backticks.\n"+OMIT_RULE
    +"- The note MUST start with the opening line beginning \"GWM met with Client\". Insert the meeting medium exactly as stated: \"by phone\", \"in person\", or \"by Zoom\". If not stated, omit the medium.\n"
    +"- The opening line always ends with \"on "+today+".\"\n"
    +"- Use only stated facts; never invent.\n\n"
    +"RAW DICTATION:\n\"\"\""+raw+"\"\"\"";
}
const PROMPT={intake:intakePrompt,court:courtPrompt,checkin:checkinPrompt};

function cleanNarr(raw){ let d=raw.trim().replace(/\s+/g," ");
  if(d){ d=d.charAt(0).toUpperCase()+d.slice(1); if(!/[.?!]$/.test(d)) d+="."; } return d||"\u2014"; }
function intakeFallback(raw,today){ return ["Potential Client called on "+today+" regarding their DWI case.",
  "Originated By: GWM","Assigned Attorney: GWM","Details:","\u2022 "+cleanNarr(raw),"Next Steps:","\u2022 Follow up"].join("\n"); }
function courtFallback(raw,today){ return ["GWM appeared with Client on "+today+".","Details:","\u2022 "+cleanNarr(raw)].join("\n"); }
function checkinFallback(raw,today){ return ["GWM met with Client on "+today+".","Details:","\u2022 "+cleanNarr(raw)].join("\n"); }
const FALLBACK={intake:intakeFallback,court:courtFallback,checkin:checkinFallback};

/* ---------- Voice triggers ---------- */
const TRIGGERS=[
  {type:"intake",phrases:["intake","intake notes","intake note","in take"]},
  {type:"court",phrases:["court summary","court","court note","court notes","courtroom summary","court summery"]},
  {type:"checkin",phrases:["case review","check in","checkin","check-in","case review check in","case review and check in","case check in","review"]}
];
const norm=s=>s.toLowerCase().replace(/[^a-z\s-]/g,"").replace(/\s+/g," ").trim();
function matchLeadingTrigger(text){ const n=norm(text); let best=null;
  for(const t of TRIGGERS) for(const p of t.phrases){
    if(n===p||n.startsWith(p+" ")){ if(!best||p.length>best.plen)
      best={type:t.type,plen:p.length,rest:n===p?"":text.slice(text.length-(n.length-p.length-1)).trim()}; } }
  return best; }
function isExactTrigger(text){ const n=norm(text);
  for(const t of TRIGGERS) for(const p of t.phrases) if(n===p) return t.type; return null; }

/* ---------- State ---------- */
let currentType="intake";
let drafts={intake:"",court:"",checkin:""};
let outputs={intake:"",court:"",checkin:""};
let usedFallback={intake:false,court:false,checkin:false};
let listening=false,commandArmed=false,committed="";
const $=id=>document.getElementById(id);
const ta=$("transcript");

/* ---------- Render ---------- */
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function renderNote(text){ let disp="",copy="";
  for(const raw of text.split(/\r?\n/)){
    const line=raw.replace(/\s+$/,"");
    if(line.trim()===""){ disp+='<div class="sp"></div>'; copy+='<div style="height:6px"></div>'; continue; }
    const tl=line.trim();
    if(/^[\u2022\u00b7]\s?/.test(tl)||/^-\s/.test(tl)){
      const txt=esc(tl.replace(/^[\u2022\u00b7]\s?/,"").replace(/^-\s/,""));
      disp+='<div class="bul">&bull; '+txt+'</div>';
      copy+='<div style="margin-left:16px">&bull; '+txt+'</div>'; continue; }
    const ci=line.indexOf(":");
    if(ci>-1){ const lbl=esc(line.slice(0,ci+1)),val=esc(line.slice(ci+1));
      disp+='<div class="row"><span class="lbl">'+lbl+'</span>'+val+'</div>';
      copy+='<div><b><u>'+lbl+'</u></b>'+val+'</div>'; }
    else { disp+='<div class="sum">'+esc(line)+'</div>'; copy+='<div>'+esc(line)+'</div>'; }
  }
  return {disp,copy}; }

/* ---------- UI helpers ---------- */
function setStatus(txt,o){ o=o||{}; $("status").className="status"+(o.ready?" ready":"");
  $("status").innerHTML=(o.rec?'<span class="dot"></span>':'')+txt; }
function refreshBtn(){ $("formatBtn").disabled=ta.value.trim().length<3; }
function activateTab(type){ currentType=type;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.type===type));
  ta.value=drafts[type]; syncOutput(); refreshBtn(); }
function syncOutput(){
  if(outputs[currentType]){ const r=renderNote(outputs[currentType]);
    const el=$("noteOut"); el.innerHTML=r.disp; el.style.fontFamily=noteFont();
    $("outTitle").textContent=TITLES[currentType];
    $("fbNote").classList.toggle("show",usedFallback[currentType]);
    $("outputCard").classList.add("show");
  } else $("outputCard").classList.remove("show"); }

/* ---------- Tabs ---------- */
$("tabs").addEventListener("click",e=>{ const btn=e.target.closest(".tab"); if(!btn) return;
  drafts[currentType]=ta.value; activateTab(btn.dataset.type);
  committed=ta.value?ta.value.replace(/\s*$/,"")+" ":"";
  if(!listening) startSession(false); else commandArmed=false;
  setStatus("ready to dictate \u00b7 "+TYPE_LABEL[currentType],{rec:true,ready:true}); });
ta.addEventListener("input",()=>{ drafts[currentType]=ta.value;
  committed=ta.value?ta.value.replace(/\s*$/,"")+" ":""; refreshBtn(); });

/* ---------- Speech ---------- */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recog=null;
if(!SR){ $("warn").classList.add("show");
  $("warn").textContent="Live dictation isn't supported here. Use Chrome on Android or Safari on iOS. You can still type or paste, then generate."; }
function startSession(armed){ listening=true; commandArmed=armed; $("micBtn").classList.add("live");
  if(armed) setStatus("listening \u00b7 say a type or dictate",{rec:true}); startRecog(); }
function startRecog(){ if(!SR) return;
  recog=new SR(); recog.continuous=true; recog.interimResults=true; recog.lang="en-US";
  committed=ta.value?ta.value.replace(/\s*$/,"")+" ":"";
  recog.onresult=e=>{ let interim="";
    for(let i=e.resultIndex;i<e.results.length;i++){ const r=e.results[i];
      if(r.isFinal) handleFinal(r[0].transcript); else interim+=r[0].transcript; }
    ta.value=(committed+interim).replace(/\s+/g," ").trimStart();
    drafts[currentType]=ta.value; ta.scrollTop=ta.scrollHeight; refreshBtn(); };
  recog.onerror=ev=>{ if(ev.error==="not-allowed"||ev.error==="service-not-allowed"){
      stopSession(); $("warn").classList.add("show");
      $("warn").textContent="Microphone blocked. Enable mic access for this page, then tap the mic again."; } };
  recog.onend=()=>{ if(listening){ try{recog.start();}catch(_){} } };
  try{recog.start();}catch(_){} }
function handleFinal(chunk){
  if(commandArmed){ const m=matchLeadingTrigger(chunk);
    if(m){ drafts[currentType]=ta.value; activateTab(m.type);
      committed=ta.value?ta.value.replace(/\s*$/,"")+" ":""; commandArmed=false;
      setStatus("ready to dictate \u00b7 "+TYPE_LABEL[currentType],{rec:true,ready:true});
      if(m.rest) committed+=m.rest.trim()+" "; return; } }
  const ex=isExactTrigger(chunk);
  if(ex){ drafts[currentType]=ta.value; activateTab(ex);
    committed=ta.value?ta.value.replace(/\s*$/,"")+" ":""; commandArmed=false;
    setStatus("ready to dictate \u00b7 "+TYPE_LABEL[currentType],{rec:true,ready:true}); return; }
  committed+=chunk.trim()+" ";
  if(commandArmed){ commandArmed=false; setStatus("recording \u00b7 "+TYPE_LABEL[currentType],{rec:true,ready:true}); } }
function stopSession(){ listening=false; commandArmed=false; $("micBtn").classList.remove("live");
  setStatus("// tap a type or the mic"); if(recog){ try{recog.stop();}catch(_){} } }
$("micBtn").addEventListener("click",()=>{ if(listening){ stopSession(); return; }
  if(!SR){ ta.focus(); return; } startSession(true); });

/* ---------- Clear ---------- */
$("clearBtn").addEventListener("click",()=>{ ta.value=""; drafts[currentType]=""; committed=""; refreshBtn(); ta.focus(); });

/* ---------- AI call: Worker proxy if configured, else direct ---------- */
async function callAI(prompt){
  const configured = WORKER_URL && !/PASTE_YOUR/.test(WORKER_URL);
  if(configured){
    const headers={"Content-Type":"application/json"};
    if(APP_TOKEN) headers["x-app-token"]=APP_TOKEN;
    const res=await fetch(WORKER_URL,{method:"POST",headers,body:JSON.stringify({prompt})});
    const d=await res.json().catch(()=>({}));
    if(!res.ok||d.error) throw new Error(d.error||("worker "+res.status));
    return (d.text||"").trim();
  }
  // No Worker yet: direct call (works only inside the Claude app)
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,
      messages:[{role:"user",content:prompt}]}) });
  if(!res.ok) throw new Error("api "+res.status);
  const d=await res.json();
  return (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}

/* ---------- Generate ---------- */
async function generate(){ const raw=ta.value.trim(); if(raw.length<3) return;
  const btn=$("formatBtn"); if(listening) stopSession();
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Generating';
  let out="",fallback=false;
  const today=todayStr();
  try{ out=(await callAI(PROMPT[currentType](raw,today))).replace(/```/g,"").trim();
    if(!out) throw new Error("empty");
  }catch(err){ out=FALLBACK[currentType](raw,today); fallback=true; }
  outputs[currentType]=out; usedFallback[currentType]=fallback;
  syncOutput(); $("outputCard").scrollIntoView({behavior:"smooth",block:"nearest"});
  btn.innerHTML="Generate Smart Notes"; refreshBtn(); }
$("formatBtn").addEventListener("click",generate);
$("reformatBtn").addEventListener("click",generate);

/* ---------- Copy (rich for Clio) ---------- */
async function copyOut(){ const text=outputs[currentType]; if(!text) return;
  const r=renderNote(text);
  const html='<div style="font-family:'+noteFont()+';font-size:11pt;line-height:1.5">'+r.copy+'</div>';
  try{
    if(window.ClipboardItem && navigator.clipboard && navigator.clipboard.write){
      await navigator.clipboard.write([new ClipboardItem({
        "text/html":new Blob([html],{type:"text/html"}),
        "text/plain":new Blob([text],{type:"text/plain"})})]);
      showToast("Copied \u00b7 paste into Clio"); return; }
    throw new Error("no rich");
  }catch(_){
    try{ await navigator.clipboard.writeText(text); showToast("Copied \u00b7 paste into Clio"); return; }
    catch(e){ const tmp=document.createElement("textarea"); tmp.value=text;
      document.body.appendChild(tmp); tmp.select();
      try{document.execCommand("copy"); showToast("Copied \u00b7 paste into Clio");}
      catch(e2){showToast("Select text to copy");}
      document.body.removeChild(tmp); } } }
$("copyBtn").addEventListener("click",copyOut);

/* ---------- Toast ---------- */
let toastT;
function showToast(m){ const el=$("toast"); el.textContent=m; el.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),2200); }

refreshBtn();
</script>
